<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>AI改寫工具範例</title>
<style>
body { font-family: Arial; background:#f6f7fb; display:flex; justify-content:center; align-items:center; height:100vh; }
.container { background:white; padding:35px; border-radius:14px; width:360px; box-shadow:0 6px 20px rgba(0,0,0,0.08);}
h1 { text-align:center; margin-bottom:20px;}
input { padding:12px; width:100%; margin-bottom:12px; border-radius:8px; border:1px solid #ddd;}
select { padding:12px; width:100%; margin-bottom:12px; border-radius:8px; border:1px solid #ddd;}
button { padding:12px; width:100%; background:#4a6cf7; color:white; border:none; border-radius:8px; cursor:pointer;}
button:hover { background:#3b5be0;}
.result-box { margin-top:20px; padding:15px; background:#f1f3f9; border-radius:8px; min-height:60px;}
.label { font-size:13px; color:#666; margin-bottom:5px;}
.loading { color:gray; font-style:italic;}
</style>
</head>
<body>

<div class="container">
<h1>AI改寫工具範例</h1>

<div class="label">輸入文字</div>
<input type="text" id="inputText" placeholder="請輸入文字，例如：我好懶">

<div class="label">改寫風格</div>
<select id="style">
<option value="簡單改寫">簡單改寫</option>
<option value="更有力改寫">更有力改寫</option>
<option value="IG風格改寫">IG風格改寫</option>
</select>

<button onclick="rewriteExample()">開始改寫</button>

<div class="result-box">
<div class="label">改寫結果</div>
<div id="result">（結果會顯示在這裡）</div>
</div>

<div class="result-box">
<div class="label">收集使用者輸入</div>
<ul id="inputList"></ul>
</div>
</div>

<script>

let userInputs = []; // 用來收集使用者輸入

function rewriteExample() {
    const input = document.getElementById("inputText").value.trim();
    const style = document.getElementById("style").value;
    const resultDiv = document.getElementById("result");
    const inputList = document.getElementById("inputList");

    if(!input){
        resultDiv.innerText = "請先輸入文字";
        return;
    }

    // 收集輸入
    userInputs.push(input);

    resultDiv.classList.add("loading");
    resultDiv.innerText = "AI 思考中...";

    setTimeout(() => {
        let rewritten = "";

        // 模擬不同風格改寫
        if(input === "我好懶") {
            if(style === "簡單改寫") rewritten = "你其實不是懶，只是還沒找到目標";
            if(style === "更有力改寫") rewritten = "你不是懶惰，而是潛力未被激發，現在就該行動！";
            if(style === "IG風格改寫") rewritten = "✨ 其實你不是懶 ✨\n只是還沒找到目標 💡 #勵志 #每日一提醒";
        } else {
            rewritten = style + "：" + input;
        }

        resultDiv.classList.remove("loading");
        resultDiv.innerText = rewritten;

        // 更新收集輸入列表
        inputList.innerHTML = "";
        userInputs.forEach((text, index) => {
            const li = document.createElement("li");
            li.innerText = text;
            inputList.appendChild(li);
        });
        // 清空輸入框
        document.getElementById("inputText").value = "";
    }, 1000);
}
</script>

</body>
</html>
